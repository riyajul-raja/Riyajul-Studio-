<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyajul Studio</title>

<!-- Boxicons CDN for Modern Icons -->
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: #0f172a;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    padding-bottom: 80px; 
}

/* Background Animated Blobs */
body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: -1;
    animation: float 8s infinite ease-in-out alternate;
}

body::before {
    width: 350px;
    height: 350px;
    background: rgba(37, 99, 235, 0.6);
    top: -50px;
    left: -100px;
}

body::after {
    width: 300px;
    height: 300px;
    background: rgba(6, 182, 212, 0.5);
    bottom: 50px;
    right: -50px;
    animation-delay: -4s;
}

@keyframes float {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(30px) scale(1.1); }
}

/* Common Glass Effect Class */
.glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

/* Loading Screen (shown while checking auth) */
#auth-check-loader {
    position: fixed;
    inset: 0;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
#auth-check-loader .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(56, 189, 248, 0.2);
    border-top-color: #38bdf8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* App content hidden until auth confirms, prevents flash of content */
#app-content {
    display: none;
}

/* Header */
.header {
    padding: 25px 20px;
    border-radius: 0 0 30px 30px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    animation: slideDown 0.8s ease-out forwards;
}

.header h1 {
    font-size: 32px;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.header p {
    opacity: 0.8;
    margin-top: 5px;
    font-size: 15px;
}

/* Search Bar */
.search {
    margin-top: 25px;
    position: relative;
}

.search i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    color: rgba(255, 255, 255, 0.6);
}

.search input {
    width: 100%;
    padding: 15px 20px 15px 45px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 15px;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
}

.search input::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

.search input:focus {
    background: rgba(255, 255, 255, 0.15);
    border-color: #38bdf8;
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
}

.search input:focus + i {
    color: #38bdf8;
}

/* Grid Container */
.container {
    padding: 30px 20px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

/* Cards */
.card {
    border-radius: 20px;
    padding: 25px 15px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    opacity: 0;
    transform: translateY(30px);
    animation: slideUp 0.6s ease forwards;
}

.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }
.card:nth-child(5) { animation-delay: 0.5s; }
.card:nth-child(6) { animation-delay: 0.6s; }

.card:hover {
    transform: translateY(-8px) scale(1.05);
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.3);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(56, 189, 248, 0.2);
}

/* Premium Icons Styling */
.icon i {
    font-size: 48px;
    margin-bottom: 15px;
    color: #38bdf8; /* Cyan-blue color to match theme */
    transition: transform 0.3s, color 0.3s;
    display: inline-block;
}

.card:hover .icon i {
    transform: scale(1.2) translateY(-5px);
    color: #818cf8; /* Light purple on hover */
}

.title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* Bottom Navigation */
.bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    padding: 12px 10px;
    border-radius: 25px 25px 0 0;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 10;
}

.bottom button {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.6);
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: 0.3s;
    padding: 8px 15px;
    border-radius: 12px;
}

.bottom button i {
    font-size: 24px;
}

.bottom button:hover, .bottom button.active {
    color: #38bdf8;
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-3px);
}

/* Animations */
@keyframes slideUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
}

@keyframes slideDown {
    0% { opacity: 0; transform: translateY(-30px); }
    100% { opacity: 1; transform: translateY(0); }
}

@media(min-width: 600px) {
    .container { grid-template-columns: repeat(3, 1fr); max-width: 900px; margin: 0 auto; }
    .header, .bottom { max-width: 900px; margin: 0 auto; left: 0; right: 0; }
}
</style>

</head>

<body>

<!-- Shown while we check if the user is actually logged in -->
<div id="auth-check-loader">
    <div class="spinner"></div>
</div>

<!-- Real page content, hidden until auth is confirmed -->
<div id="app-content">

<div class="header glass">
    <h1>Riyajul Studio</h1>
    <p id="welcome-text">Most Welcome 👋</p>

    <div class="search">
        <i class='bx bx-search'></i>
        <input type="text" placeholder="Search resources...">
    </div>
</div>

<div class="container">
    <div class="card glass">
        <div class="icon"><i class='bx bx-camera'></i></div>
        <div class="title">Photo Editor</div>
    </div>

    <div class="card glass">
        <div class="icon"><i class='bx bx-movie-play'></i></div>
        <div class="title">Video Editor</div>
    </div>

    <div class="card glass">
        <div class="icon"><i class='bx bx-bot'></i></div>
        <div class="title">AI Assistant</div>
    </div>

    <div class="card glass">
        <div class="icon"><i class='bx bx-folder-open'></i></div>
        <div class="title">My Files</div>
    </div>

    <div class="card glass">
        <div class="icon"><i class='bx bx-user'></i></div>
        <div class="title">Profile</div>
    </div>

    <div class="card glass">
        <div class="icon"><i class='bx bx-cog'></i></div>
        <div class="title">Settings</div>
    </div>
</div>

<div class="bottom glass">
    <button class="active">
        <i class='bx bx-home-alt'></i>
        <span>Home</span>
    </button>
    <button>
        <i class='bx bx-bell'></i>
        <span>Notify</span>
    </button>
    <button>
        <i class='bx bx-user-circle'></i>
        <span>Profile</span>
    </button>
    <button id="logout-btn">
        <i class='bx bx-log-out'></i>
        <span>Logout</span>
    </button>
</div>

</div>
<!-- end app-content -->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDOg7zZAh3W9P_rcgTAEFBEh1fe5vDb-oo",
    authDomain: "riyajul-studio.firebaseapp.com",
    projectId: "riyajul-studio",
    storageBucket: "riyajul-studio.firebasestorage.app",
    messagingSenderId: "96233401450",
    appId: "1:96233401450:web:587ee8bc71585f91102e13",
    measurementId: "G-5D479VYKBQ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // THE ACTUAL GUARD: runs on every page load
  onAuthStateChanged(auth, (user) => {
      if (user) {
          // Logged in — show the real page
          let name = user.displayName || user.email || "there";
          document.getElementById('welcome-text').innerText = "Welcome, " + name + " 👋";
          document.getElementById('auth-check-loader').style.display = 'none';
          document.getElementById('app-content').style.display = 'block';
      } else {
          // Not logged in — bounce back to login page immediately
          window.location.href = 'index.html';
      }
  });

  document.getElementById('logout-btn').addEventListener('click', function() {
      signOut(auth).then(() => {
          window.location.href = 'index.html';
      });
  });
</script>

</body>
</html>
