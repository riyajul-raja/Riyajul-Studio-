<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyajul Studio - Premium Welcome</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; color: #fff; overflow: hidden; position: relative; padding: 20px; }
body::before, body::after { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; animation: float 8s infinite ease-in-out alternate; }
body::before { width: 350px; height: 350px; background: rgba(37, 99, 235, 0.5); top: -50px; left: -100px; }
body::after { width: 300px; height: 300px; background: rgba(6, 182, 212, 0.4); bottom: -50px; right: -50px; animation-delay: -4s; }
@keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(30px) scale(1.1); } }

.container { 
    width: 100%; 
    max-width: 400px; 
    background: rgba(255, 255, 255, 0.05); 
    backdrop-filter: blur(16px); 
    -webkit-backdrop-filter: blur(16px); 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); 
    border-radius: 25px; 
    padding: 40px 30px; 
    text-align: center; 
    animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
    position: relative; 
    overflow: hidden; 
}
.container::after {
    content: '';
    position: absolute;
    top: 0; left: -150%;
    width: 50%; height: 100%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
    transform: skewX(-25deg);
    animation: shineBox 4s ease-in-out infinite;
    pointer-events: none;
    z-index: 10;
}
@keyframes shineBox { 0% { left: -150%; } 30% { left: 200%; } 100% { left: 200%; } }
@keyframes slideUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

.logo { font-size: 45px; color: #38bdf8; margin-bottom: 10px; display: inline-block; }

.title { 
    font-size: 26px; 
    margin-bottom: 5px; 
    background: linear-gradient(90deg, #fff 0%, #fff 40%, #38bdf8 50%, #fff 60%, #fff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shineText 5s ease-in-out infinite;
}
@keyframes shineText { 0% { background-position: 150% center; } 20% { background-position: -150% center; } 100% { background-position: -150% center; } }
.subtitle { font-size: 14px; color: rgba(255, 255, 255, 0.6); margin-bottom: 25px; }

.tab-box { display: flex; background: rgba(255, 255, 255, 0.05); border-radius: 12px; margin-bottom: 25px; position: relative; border: 1px solid rgba(255, 255, 255, 0.1); padding: 4px; }
.tab-btn { flex: 1; padding: 10px; background: none; border: none; color: rgba(255, 255, 255, 0.6); font-size: 15px; font-weight: 600; cursor: pointer; position: relative; z-index: 2; transition: color 0.3s; }
.tab-btn.active-text { color: #fff; }
.tab-bg { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: rgba(56, 189, 248, 0.2); border: 1px solid rgba(56, 189, 248, 0.4); border-radius: 8px; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }

.form-area { width: 100%; overflow: hidden; }
.form-wrapper { display: flex; width: 200%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
.form { width: 50%; padding: 0 2px; }
.input-group { position: relative; margin-bottom: 15px; display: flex; }
.input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; color: rgba(255, 255, 255, 0.5); transition: 0.3s; }
.input-group input { width: 100%; padding: 14px 45px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
.input-group input:focus { background: rgba(255, 255, 255, 0.12); border-color: #38bdf8; box-shadow: 0 0 12px rgba(56, 189, 248, 0.2); }
.input-group input:focus + i { color: #38bdf8; }

.input-group .toggle-password { position: absolute; top: 50%; left: auto; right: 15px; transform: translateY(-50%); cursor: pointer; pointer-events: auto; display: flex; align-items: center; color: rgba(255, 255, 255, 0.5); }
.input-group .toggle-password:hover { color: #38bdf8; }
.input-group .toggle-password svg { display: block; }
.input-error { border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3) !important; }
.input-success { border-color: #22c55e !important; box-shadow: 0 0 12px rgba(34, 197, 94, 0.4) !important; }
.error-msg { color: #ef4444; font-size: 13px; margin-bottom: 15px; text-align: left; display: none; padding-left: 5px; font-weight: 600; }
.success-msg { color: #22c55e !important; }

.main-btn { width: 100%; padding: 14px; margin-top: 5px; background: linear-gradient(135deg, #2563eb, #06b6d4); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(6, 182, 212, 0.3); position: relative; z-index: 20; }
.main-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(6, 182, 212, 0.5); }
.main-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.divider { margin: 20px 0; display: flex; align-items: center; color: rgba(255, 255, 255, 0.4); font-size: 12px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1); }
.divider::before { margin-right: 10px; } .divider::after { margin-left: 10px; }
.social-login { display: flex; gap: 15px; position: relative; z-index: 20; }
.social-btn { flex: 1; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
.social-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
.social-btn.google:hover { border-color: #ea4335; color: #ea4335; }
.social-btn.facebook:hover { border-color: #1877f2; color: #1877f2; }
.links { margin-top: 15px; font-size: 13px; position: relative; z-index: 20; }
.links a { color: rgba(255, 255, 255, 0.6); text-decoration: none; transition: 0.3s; }
.links a:hover { color: #38bdf8; }
</style>
</head>

<body>

<div class="container">
    <i class='bx bxl-sketch logo'></i>
    <h1 class="title">Riyajul Studio</h1>
    <p class="subtitle">Your creative space awaits</p>

    <div class="tab-box">
        <div class="tab-bg" id="tab-bg"></div> 
        <button class="tab-btn active-text" id="btn-login" onclick="window.switchTab('login')">Sign In</button>
        <button class="tab-btn" id="btn-register" onclick="window.switchTab('register')">Sign Up</button>
    </div>

    <div class="form-area">
        <div class="form-wrapper" id="form-wrapper">
            
            <!-- LOGIN FORM -->
            <div class="form">
                <div class="input-group">
                    <input type="email" id="login-email" placeholder="Email">
                    <i class='bx bx-user'></i>
                </div>

                <div class="input-group">
                    <input type="password" id="login-pass" placeholder="Password">
                    <i class='bx bx-lock-alt'></i>
                    <span class="toggle-password" onclick="window.togglePassword('login-pass', this)" role="button" aria-label="Show password">
                        <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.4 18.4 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </span>
                </div>
                
                <p class="error-msg" id="login-error">⚠️ Error here</p>
                <button class="main-btn" id="login-btn" onclick="window.processRealLogin()">Login</button>
                <div class="links"><a href="#" onclick="window.resetPassword()">Forgot Password?</a></div>
                <div class="divider">OR CONTINUE WITH</div>
                <div class="social-login">
                    <button class="social-btn google" onclick="window.realGoogleLogin(this)"><i class='bx bxl-google'></i></button>
                    <button class="social-btn facebook" onclick="window.realFacebookLogin(this)"><i class='bx bxl-facebook'></i></button>
                </div>
            </div>

            <!-- REGISTER FORM -->
            <div class="form">
                <div class="input-group">
                    <input type="text" id="reg-name" placeholder="Full Name">
                    <i class='bx bx-id-card'></i>
                </div>
                <div class="input-group">
                    <input type="email" id="reg-email" placeholder="Email">
                    <i class='bx bx-envelope'></i>
                </div>

                <div class="input-group">
                    <input type="password" id="reg-pass" placeholder="Create Password">
                    <i class='bx bx-lock-open-alt'></i>
                    <span class="toggle-password" onclick="window.togglePassword('reg-pass', this)" role="button" aria-label="Show password">
                        <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.4 18.4 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </span>
                </div>
                
                <p class="error-msg" id="reg-error">⚠️ Error here</p>
                <button class="main-btn" id="reg-btn" onclick="window.processRealRegister()">Create Account</button>
                <div class="divider">OR REGISTER WITH</div>
                <div class="social-login">
                    <button class="social-btn google" onclick="window.realGoogleLogin(this)"><i class='bx bxl-google'></i></button>
                    <button class="social-btn facebook" onclick="window.realFacebookLogin(this)"><i class='bx bxl-facebook'></i></button>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- REAL FIREBASE SCRIPT -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    signInWithPopup,
    signInWithRedirect,
    getRedirectResult,
    GoogleAuthProvider,
    FacebookAuthProvider,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    fetchSignInMethodsForEmail,
    updateProfile,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDOg7zZAh3W9P_rcgTAEFBEh1fe5vDb-oo",
    authDomain: "riyajul-studio.firebaseapp.com",
    projectId: "riyajul-studio",
    storageBucket: "riyajul-studio.firebasestorage.app",
    messagingSenderId: "96233401450",
    appId: "1:96233401450:web:587ee8bc71585f91102e13",
    measurementId: "G-5D479VYKBQ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  
  const googleProvider = new GoogleAuthProvider();
  const facebookProvider = new FacebookAuthProvider();

  // Detect if running as an installed/standalone app (Add to Home Screen)
  function isStandaloneApp() {
      return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
  }

  // If we just came back from a redirect-based sign-in, finish it and go home
  getRedirectResult(auth).then((result) => {
      if (result) {
          window.location.href = 'home.html';
      }
  }).catch((error) => {
      alert("Login Error: " + error.message);
  });

  window.realGoogleLogin = function(btn) {
      if (isStandaloneApp()) {
          signInWithRedirect(auth, googleProvider);
      } else {
          signInWithPopup(auth, googleProvider)
            .then((result) => {
                window.location.href = 'home.html';
            })
            .catch((error) => {
                alert("Google Login Error: " + error.message);
            });
      }
  };

  window.realFacebookLogin = function(btn) {
      if (isStandaloneApp()) {
          signInWithRedirect(auth, facebookProvider);
      } else {
          signInWithPopup(auth, facebookProvider)
            .then((result) => {
                window.location.href = 'home.html';
            })
            .catch((error) => {
                alert("Facebook Login Error: " + error.message);
            });
      }
  };

  function showError(elId, msg) {
      let el = document.getElementById(elId);
      el.classList.remove('success-msg');
      el.innerText = "⚠️ " + msg;
      el.style.display = "block";
  }

  function showSuccess(elId, msg) {
      let el = document.getElementById(elId);
      el.classList.add('success-msg');
      el.innerText = "✅ " + msg;
      el.style.display = "block";
  }

  // --- REAL LOGIN (Email + Password) ---
  window.processRealLogin = function() {
        let email = document.getElementById('login-email').value.trim();
        let pass = document.getElementById('login-pass').value;
        let btn = document.getElementById('login-btn');

        document.getElementById('login-error').style.display = 'none';

        if (email === "" || pass === "") {
            showError('login-error', 'Email aur Password dono bharo.');
            return;
        }

        btn.disabled = true;
        btn.innerText = "Signing in...";

        signInWithEmailAndPassword(auth, email, pass)
          .then((userCredential) => {
              showSuccess('login-error', 'Logged In!');
              setTimeout(() => { window.location.href = 'home.html'; }, 800);
          })
          .catch((error) => {
              btn.disabled = false;
              btn.innerText = "Login";

              if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                  showError('login-error', 'Email ya password galat hai.');
              } else {
                  showError('login-error', error.message);
              }
          });
  }

  // --- REAL REGISTER (Email + Password) ---
  window.processRealRegister = function() {
        let name = document.getElementById('reg-name').value.trim();
        let email = document.getElementById('reg-email').value.trim();
        let pass = document.getElementById('reg-pass').value;
        let btn = document.getElementById('reg-btn');

        document.getElementById('reg-error').style.display = 'none';

        if (name === "" || email === "" || pass === "") {
            showError('reg-error', 'Sabhi fields bharo.');
            return;
        }
        if (pass.length < 6) {
            showError('reg-error', 'Password kam se kam 6 characters ka hona chahiye.');
            return;
        }

        btn.disabled = true;
        btn.innerText = "Creating...";

        createUserWithEmailAndPassword(auth, email, pass)
          .then((userCredential) => {
              return updateProfile(userCredential.user, { displayName: name });
          })
          .then(() => {
              showSuccess('reg-error', 'Account Created!');
              setTimeout(() => { window.location.href = 'home.html'; }, 800);
          })
          .catch((error) => {
              btn.disabled = false;
              btn.innerText = "Create Account";

              if (error.code === 'auth/email-already-in-use') {
                  showError('reg-error', 'Ye email pehle se registered hai.');
              } else {
                  showError('reg-error', error.message);
              }
          });
  }

  window.resetPassword = function() {
      let email = document.getElementById('login-email').value.trim();
      if (email === "") {
          showError('login-error', 'Pehle apna email likho, fir Forgot Password dabao.');
          return;
      }
      sendPasswordResetEmail(auth, email)
        .then(() => showSuccess('login-error', 'Reset link email pe bhej diya.'))
        .catch((error) => showError('login-error', error.message));
  }

  // UI Functions
  window.switchTab = function(tab) {
        const wrapper = document.getElementById('form-wrapper');
        const tabBg = document.getElementById('tab-bg');
        const btnLogin = document.getElementById('btn-login');
        const btnRegister = document.getElementById('btn-register');
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('reg-error').style.display = 'none';
        
        if(tab === 'login') {
            wrapper.style.transform = 'translateX(0%)';
            tabBg.style.transform = 'translateX(0)';
            btnLogin.classList.add('active-text');
            btnRegister.classList.remove('active-text');
        } else {
            wrapper.style.transform = 'translateX(-50%)';
            tabBg.style.transform = 'translateX(100%)';
            btnRegister.classList.add('active-text');
            btnLogin.classList.remove('active-text');
        }
  }

  // Default landing tab: Sign Up
  window.switchTab('register');

  window.togglePassword = function(inputId, toggleSpan) {
        let passwordInput = document.getElementById(inputId);
        let eyeOpen = toggleSpan.querySelector('.eye-open');
        let eyeClosed = toggleSpan.querySelector('.eye-closed');
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            eyeOpen.style.display = "none";
            eyeClosed.style.display = "block";
            toggleSpan.style.color = "#38bdf8";
        } else {
            passwordInput.type = "password";
            eyeOpen.style.display = "block";
            eyeClosed.style.display = "none";
            toggleSpan.style.color = "rgba(255, 255, 255, 0.5)";
        }
  }
</script>

</body>
</html>
