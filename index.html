<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyajul Studio - Premium Welcome</title>
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; color: #fff; overflow: hidden; position: relative; padding: 20px; }
body::before, body::after { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; animation: float 8s infinite ease-in-out alternate; }
body::before { width: 350px; height: 350px; background: rgba(37, 99, 235, 0.5); top: -50px; left: -100px; }
body::after { width: 300px; height: 300px; background: rgba(6, 182, 212, 0.4); bottom: -50px; right: -50px; animation-delay: -4s; }
@keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(30px) scale(1.1); } }

/* CONTAINER WITH SHINE EFFECT */
.container { 
    width: 100%; 
    max-width: 400px; 
    background: rgba(255, 255, 255, 0.05); 
    backdrop-filter: blur(16px); 
    -webkit-backdrop-filter: blur(16px); 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); 
    border-radius: 25px; 
    padding: 40px 30px; 
    text-align: center; 
    animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
    position: relative; 
    overflow: hidden; 
}
.container::after {
    content: '';
    position: absolute;
    top: 0; left: -150%;
    width: 50%; height: 100%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
    transform: skewX(-25deg);
    animation: shineBox 4s ease-in-out infinite;
    pointer-events: none;
    z-index: 10;
}
@keyframes shineBox { 0% { left: -150%; } 30% { left: 200%; } 100% { left: 200%; } }
@keyframes slideUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

/* DIAMOND LOGO */
.logo { font-size: 45px; color: #38bdf8; margin-bottom: 10px; display: inline-block; }

/* TITLE SHINE */
.title { 
    font-size: 26px; 
    margin-bottom: 5px; 
    background: linear-gradient(90deg, #fff 0%, #fff 40%, #38bdf8 50%, #fff 60%, #fff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shineText 5s ease-in-out infinite;
}
@keyframes shineText { 0% { background-position: 150% center; } 20% { background-position: -150% center; } 100% { background-position: -150% center; } }
.subtitle { font-size: 14px; color: rgba(255, 255, 255, 0.6); margin-bottom: 25px; }

/* TABS */
.tab-box { display: flex; background: rgba(255, 255, 255, 0.05); border-radius: 12px; margin-bottom: 25px; position: relative; border: 1px solid rgba(255, 255, 255, 0.1); padding: 4px; }
.tab-btn { flex: 1; padding: 10px; background: none; border: none; color: rgba(255, 255, 255, 0.6); font-size: 15px; font-weight: 600; cursor: pointer; position: relative; z-index: 2; transition: color 0.3s; }
.tab-btn.active-text { color: #fff; }
.tab-bg { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: rgba(56, 189, 248, 0.2); border: 1px solid rgba(56, 189, 248, 0.4); border-radius: 8px; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }

/* FORMS & INPUTS */
.form-area { width: 100%; overflow: hidden; }
.form-wrapper { display: flex; width: 200%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
.form { width: 50%; padding: 0 2px; }
.input-group { position: relative; margin-bottom: 15px; display: flex; }
.input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; color: rgba(255, 255, 255, 0.5); transition: 0.3s; }
.input-group input { width: 100%; padding: 14px 45px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
.input-group input:focus { background: rgba(255, 255, 255, 0.12); border-color: #38bdf8; box-shadow: 0 0 12px rgba(56, 189, 248, 0.2); }
.input-group input:focus + i { color: #38bdf8; }

/* OTP CSS */
.otp-btn { background: rgba(56, 189, 248, 0.15); border: 1px solid rgba(56, 189, 248, 0.4); color: #38bdf8; border-radius: 12px; padding: 0 15px; cursor: pointer; transition: 0.3s; font-weight: 600; outline: none; margin-left: 10px; white-space: nowrap; }
.otp-btn:hover { background: rgba(56, 189, 248, 0.3); }
.otp-btn:disabled { color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.2); cursor: not-allowed; background: transparent; }
.timer-text { font-size: 12px; color: #38bdf8; text-align: right; margin-top: -10px; margin-bottom: 12px; display: none; }

/* PASSWORDS & ERRORS */
.input-group .toggle-password { left: auto; right: 15px; cursor: pointer; pointer-events: auto; }
.input-group .toggle-password:hover { color: #38bdf8; }
.input-error { border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3) !important; }
.input-success { border-color: #22c55e !important; box-shadow: 0 0 12px rgba(34, 197, 94, 0.4) !important; }
.error-msg { color: #ef4444; font-size: 13px; margin-bottom: 15px; text-align: left; display: none; padding-left: 5px; font-weight: 600; }
.success-msg { color: #22c55e !important; }

/* BUTTONS & SOCIALS */
.main-btn { width: 100%; padding: 14px; margin-top: 5px; background: linear-gradient(135deg, #2563eb, #06b6d4); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(6, 182, 212, 0.3); position: relative; z-index: 20; }
.main-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(6, 182, 212, 0.5); }
.divider { margin: 20px 0; display: flex; align-items: center; color: rgba(255, 255, 255, 0.4); font-size: 12px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1); }
.divider::before { margin-right: 10px; } .divider::after { margin-left: 10px; }
.social-login { display: flex; gap: 15px; position: relative; z-index: 20; }
.social-btn { flex: 1; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
.social-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
.social-btn.google:hover { border-color: #ea4335; color: #ea4335; }
.social-btn.facebook:hover { border-color: #1877f2; color: #1877f2; }
.links { margin-top: 15px; font-size: 13px; position: relative; z-index: 20; }
.links a { color: rgba(255, 255, 255, 0.6); text-decoration: none; transition: 0.3s; }
.links a:hover { color: #38bdf8; }
</style>
</head>
<body>

<div id="recaptcha-container"></div>
<div class="container">
    <i class='bx bxl-sketch logo'></i>
    <h1 class="title">Riyajul Studio</h1>
    <p class="subtitle">Your creative space awaits</p>

    <div class="tab-box">
        <div class="tab-bg" id="tab-bg"></div> 
        <button class="tab-btn active-text" id="btn-login" onclick="window.switchTab('login')">Sign In</button>
        <button class="tab-btn" id="btn-register" onclick="window.switchTab('register')">Sign Up</button>
    </div>

    <div class="form-area">
        <div class="form-wrapper" id="form-wrapper">
            
            <div class="form">
                
                <div id="standard-login">
                    <div class="input-group">
                        <input type="text" id="login-email" placeholder="Email or Mobile">
                        <i class='bx bx-user'></i>
                    </div>

                    <div class="input-group">
                        <input type="password" id="login-pass" placeholder="Password">
                        <i class='bx bx-lock-alt'></i>
                        <i class='bx bx-hide toggle-password' onclick="window.togglePassword('login-pass', this)"></i>
                    </div>
                    
                    <p class="error-msg" id="login-error">⚠️ Error here</p>
                    <button class="main-btn" onclick="window.processRealLogin()">Login</button>
                    
                    <div class="links"><a href="#" onclick="window.showForgotPass(true)">Forgot Password?</a></div>
                    
                    <div class="divider">OR CONTINUE WITH</div>
                    <div class="social-login">
                        <button class="social-btn google" onclick="window.realGoogleLogin(this)"><i class='bx bxl-google'></i></button>
                        <button class="social-btn facebook" onclick="window.realFacebookLogin(this)"><i class='bx bxl-facebook'></i></button>
                    </div>
                </div>

                <div id="forgot-pass-section" style="display: none;">
                    <h3 style="font-size: 18px; margin-bottom: 10px; color: #fff;">Reset Password</h3>
                    <p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 20px;">We will send an OTP to your registered mobile number.</p>
                    
                    <div class="input-group">
                        <input type="text" id="reset-phone" placeholder="Mobile Number">
                        <i class='bx bx-phone'></i>
                    </div>
    
                    <div class="input-group">
                        <input type="number" id="reset-otp" placeholder="Enter OTP">
                        <i class='bx bx-message-square-dots'></i>
                        <button class="otp-btn" id="reset-otp-btn" onclick="window.sendRealOTP('reset')">Send OTP</button>
                    </div>
                    <div class="timer-text" id="reset-timer">Resend in 30s</div>
    
                    <div class="input-group">
                        <input type="password" id="new-pass" placeholder="New Password">
                        <i class='bx bx-lock-alt'></i>
                        <i class='bx bx-hide toggle-password' onclick="window.togglePassword('new-pass', this)"></i>
                    </div>
    
                    <p class="error-msg" id="reset-error">⚠️ Error here</p>
                    <button class="main-btn" onclick="window.processResetPassword()">Reset Password</button>
                    <div class="links" style="margin-top: 15px;"><a href="#" onclick="window.showForgotPass(false)">Back to Login</a></div>
                </div>

            </div>

            <div class="form">
                <div class="input-group">
                    <input type="text" id="reg-name" placeholder="Full Name">
                    <i class='bx bx-id-card'></i>
                </div>
                <div class="input-group">
                    <input type="text" id="reg-email" placeholder="Mobile Number">
                    <i class='bx bx-phone'></i>
                </div>
                
                <div class="input-group">
                    <input type="number" id="reg-otp" placeholder="Enter OTP">
                    <i class='bx bx-message-square-dots'></i>
                    <button class="otp-btn" id="reg-otp-btn" onclick="window.sendRealOTP('register')">Send OTP</button>
                </div>
                <div class="timer-text" id="reg-timer">Resend in 30s</div>

                <div class="input-group">
                    <input type="password" id="reg-pass" placeholder="Create Password">
                    <i class='bx bx-lock-open-alt'></i>
                    <i class='bx bx-hide toggle-password' onclick="window.togglePassword('reg-pass', this)"></i>
                </div>
                
                <p class="error-msg" id="reg-error">⚠️ Error here</p>
                <button class="main-btn" onclick="window.processRealRegister()">Create Account</button>
                <div class="divider">OR REGISTER WITH</div>
                <div class="social-login">
                    <button class="social-btn google" onclick="window.realGoogleLogin(this)"><i class='bx bxl-google'></i></button>
                    <button class="social-btn facebook" onclick="window.realFacebookLogin(this)"><i class='bx bxl-facebook'></i></button>
                </div>
            </div>

        </div>
    </div>
</div>

<script type="module">
  // Import Phone Auth features
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, FacebookAuthProvider, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDOg7zZAh3W9P_rcgTAEFBEh1fe5vDb-oo",
    authDomain: "riyajul-studio.firebaseapp.com",
    projectId: "riyajul-studio",
    storageBucket: "riyajul-studio.firebasestorage.app",
    messagingSenderId: "96233401450",
    appId: "1:96233401450:web:587ee8bc71585f91102e13",
    measurementId: "G-5D479VYKBQ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  
  const googleProvider = new GoogleAuthProvider();
  const facebookProvider = new FacebookAuthProvider();

  // Social Logins
  getRedirectResult(auth).then((result) => {
    if (result) {
      window.location.href = 'home.html';
    }
  }).catch((error) => {
    console.error("Login Error: ", error);
  });

  window.realGoogleLogin = function(btn) {
      signInWithRedirect(auth, googleProvider);
  };

  window.realFacebookLogin = function(btn) {
      signInWithRedirect(auth, facebookProvider);
  };

  // Setup Invisible Recaptcha for Phone Auth
  window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
    'size': 'invisible',
    'callback': (response) => {
      // reCAPTCHA solved
    }
  });

  // --- REAL OTP LOGIC ---
  window.sendRealOTP = function(type) {
      // Adjusted logic for Reset vs Register
      let inputId = type === 'reset' ? 'reset-phone' : 'reg-email';
      let btnId = type === 'reset' ? 'reset-otp-btn' : 'reg-otp-btn';
      let timerId = type === 'reset' ? 'reset-timer' : 'reg-timer';
      let errorMsgId = type === 'reset' ? 'reset-error' : 'reg-error';
      
      let phoneNumber = document.getElementById(inputId).value;
      let errorMsg = document.getElementById(errorMsgId);
      
      if (phoneNumber === "") {
          errorMsg.innerText = "⚠️ Please enter Mobile Number first!";
          errorMsg.style.display = "block";
          return;
      }

      // Check for +91, add if missing (Assuming Indian Number)
      if (!phoneNumber.startsWith('+')) {
          phoneNumber = '+91' + phoneNumber;
      }

      let btn = document.getElementById(btnId);
      btn.innerText = "Sending...";
      btn.disabled = true;

      const appVerifier = window.recaptchaVerifier;

      signInWithPhoneNumber(auth, phoneNumber, appVerifier)
          .then((confirmationResult) => {
              // SMS Sent!
              window.confirmationResult = confirmationResult;
              alert("✅ Real OTP sent via Firebase to: " + phoneNumber);
              
              // Timer Start
              let timerDisplay = document.getElementById(timerId);
              let timeLeft = 30;
              timerDisplay.style.display = "block";
              timerDisplay.innerText = "Resend in " + timeLeft + "s";

              let countdown = setInterval(() => {
                  timeLeft--;
                  timerDisplay.innerText = "Resend in " + timeLeft + "s";
                  if (timeLeft <= 0) {
                      clearInterval(countdown);
                      btn.disabled = false;
                      btn.innerText = "Resend";
                      timerDisplay.style.display = "none";
                  }
              }, 1000);
          }).catch((error) => {
              btn.innerText = "Send OTP";
              btn.disabled = false;
              errorMsg.innerText = "❌ OTP Error: " + error.message;
              errorMsg.style.display = "block";
          });
  }

  // --- STANDARD LOGIN (WITHOUT OTP) ---
  window.processRealLogin = function() {
        let email = document.getElementById('login-email').value;
        let pass = document.getElementById('login-pass');
        let errorMsg = document.getElementById('login-error');

        pass.classList.remove('input-error', 'input-success');

        if(email === "" || pass.value === "") {
            errorMsg.innerText = "⚠️ Please enter Email/Mobile and Password.";
            errorMsg.style.display = "block";
            return;
        }

        // NOTE: Hook up Firebase signInWithEmailAndPassword here if desired.
        // Simulating success below since OTP was removed:
        pass.classList.add('input-success');
        errorMsg.innerText = "✅ Logged In Successfully!";
        errorMsg.classList.add('success-msg');
        errorMsg.style.display = "block";
        
        setTimeout(() => { window.location.href = 'home.html'; }, 1000);
  }

  // --- PROCESS PASSWORD RESET ---
  window.processResetPassword = function() {
        let otp = document.getElementById('reset-otp').value;
        let newPass = document.getElementById('new-pass');
        let errorMsg = document.getElementById('reset-error');

        newPass.classList.remove('input-error', 'input-success');

        if(otp === "") {
            errorMsg.innerText = "⚠️ Please enter the OTP.";
            errorMsg.style.display = "block";
            return;
        }

        if(!window.confirmationResult) {
            errorMsg.innerText = "⚠️ Please send OTP first.";
            errorMsg.style.display = "block";
            return;
        }

        window.confirmationResult.confirm(otp).then((result) => {
            // Note: Add your custom backend logic to update the user's password here.
            newPass.classList.add('input-success');
            errorMsg.innerText = "✅ Password Reset Successfully!";
            errorMsg.classList.add('success-msg');
            errorMsg.style.display = "block";
            setTimeout(() => { window.showForgotPass(false); }, 1500);
        }).catch((error) => {
            errorMsg.innerText = "❌ Incorrect OTP.";
            errorMsg.style.display = "block";
            document.getElementById('reset-otp').classList.add('input-error');
        });
  }

  window.processRealRegister = function() {
        let otp = document.getElementById('reg-otp').value;
        let pass = document.getElementById('reg-pass');
        let errorMsg = document.getElementById('reg-error');

        pass.classList.remove('input-error', 'input-success');

        if(otp === "") {
            errorMsg.innerText = "⚠️ Please enter the OTP received on SMS.";
            errorMsg.style.display = "block";
            return;
        }

        if(!window.confirmationResult) {
            errorMsg.innerText = "⚠️ Please send OTP first.";
            errorMsg.style.display = "block";
            return;
        }

        window.confirmationResult.confirm(otp).then((result) => {
            pass.classList.add('input-success');
            errorMsg.innerText = "✅ Phone Verified & Account Created!";
            errorMsg.classList.add('success-msg');
            errorMsg.style.display = "block";
            setTimeout(() => { window.location.href = 'home.html'; }, 1000);
        }).catch((error) => {
            errorMsg.innerText = "❌ Incorrect OTP.";
            errorMsg.style.display = "block";
            document.getElementById('reg-otp').classList.add('input-error');
        });
  }

  // UI Functi
